{{ define "content" }}
<h2>Register</h2>
<form method="post">
    <p>
        <label for="username">Username: (no spaces)</label><br>
        <input type="text" id="username" name="username" placeholder="jan pona" required>
    </p>
    <p>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="jan.pona@example.com" required>
    </p>
    <p>
        <button type="submit">Register</button>
    </p>
</form>
{{ end }}
