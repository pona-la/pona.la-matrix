issuer: http://mi.pona.la/dex

storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

# HTTP service configuration
web:
  http: 127.0.0.1:5556
  # Dex UI configuration
  # frontend:
  issuer: mi pona
  logoURL: /register/static/logo.png
  dir: ""
  theme: light

logger:
  level: "info"
  format: "json"
  # Drop these attribute keys from all log output (useful for GDPR/PII suppression).
  #excludeFields: [email, username, preferred_username, groups]

# Static clients registered in Dex by default.
#
# Alternatively, clients may be added through the gRPC API.
# staticClients:
#   # Example using environment variables
#   # These fields are mutually exclusive with id and secret respectively.
#   - idEnv: DEX_CLIENT_ID
#     secretEnv: DEX_CLIENT_SECRET
#     redirectURIs:
#       - 'https://app.example.com/callback'
#     name: 'Production App'


connectors:
  - type: ldap
    id: ldap
    name: LDAP
    config:
      host: lldap:3890
      insecureNoSSL: true
      insecureSkipVerify: true
      bindDN: uid=admin,ou=people,dc=mi,dc=pona,dc=la
      bindPW: $LDAP_ADMIN_PASS
      userSearch:
        baseDN: ou=people,dc=mi,dc=pona,dc=la
        username: uid
        idAttr: uid
        emailAttr: mail
        nameAttr: displayName
        preferredUsernameAttr: uid
      groupSearch:
        baseDN: ou=groups,dc=mi,dc=pona,dc=la
        filter: "(objectClass=groupOfUniqueNames)"
        userMatchers:
          - userAttr: DN
            groupAttr: member
        nameAttr: cn
