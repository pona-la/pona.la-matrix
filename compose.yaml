services:
  caddy:
    container_name: caddy
    image: caddy:latest
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
      - 8448:8448
    environment:
      DOMAIN: ${DOMAIN}
      BACKEND_DOMAIN: ${BACKEND_DOMAIN}
      TZ: ${TZ}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./landing-page.html:/srv/www/index.html:ro
      - caddy-data:/data
      - caddy-config:/config
  dex:
    restart: unless-stopped
    container_name: dex
    image: dexidp/dex:latest-distroless
    environment:
      LDAP_ADMIN_PASS: ${LDAP_ADMIN_PASS}
      ILO_KITO: ${ILO_KITO}
    volumes:
      - ./dex.config.yaml:/etc/dex/config.docker.yaml
      - dex-data:/data
  tuwunel:
    container_name: tuwunel
    image: jevolk/tuwunel:latest
    restart: unless-stopped
    volumes:
        - tuwunel-data:/var/lib/tuwunel
    environment:
        TUWUNEL_SERVER_NAME: ${SERVER_NAME}
        TUWUNEL_TRUSTED_SERVERS: '["matrix.org"]'
        TUWUNEL_FORGET_FORCED_UPON_LEAVE: true
        TUWUNEL_LOCKDOWN_PUBLIC_ROOM_DIRECTORY: true
        TUWUNEL_ALLOW_PUBLIC_ROOM_DIRECTORY_OVER_FEDERATION: true
        TUWUNEL_ADDRESS: 0.0.0.0

        TUWUNEL_LDAP__ENABLE: true
        TUWUNEL_LDAP__URI: "ldap://lldap:3890"
        TUWUNEL_LDAP__BASE_DN: "ou=people,dc=pona,dc=la"
        TUWUNEL_LDAP__BIND_DN: "cn=admin,ou=people,dc=pona,dc=la"
        TUWUNEL_LDAP__BIND_PASSWORD_FILE: "/run/secrets/ldap_bind_password"
        TUWUNEL_LDAP__UID_ATTRIBUTE: "uid"
        TUWUNEL_LDAP__MAIL_ATTRIBUTE: "mail"
        TUWUNEL_LDAP__NAME_ATTRIBUTE: "display_name"
        TUWUNEL_LDAP__ADMIN_FILTER: "(memberOf=cn=matrix_admin,ou=groups,dc=pona,dc=la)"
    secrets:
      - ldap_bind_password
    depends_on:
      - lldap
  ooye:
    image: sim2kid/ooye-docker:latest
    container_name: ooye
    restart: unless-stopped
    ports:
      - "6693:6693"
    volumes:
      - ./ooye:/data
  lldap:
    container_name: lldap
    build:
      context: ./lldap-mi-pona
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - "lldap-data:/data"
    environment:
      TZ: ${TZ}
      UID: 1000
      GID: 1000

      LLDAP_JWT_SECRET: ${LDAP_JWT_SECRET}
      LLDAP_KEY_SEED: ${LDAP_KEY_SEED}
      LLDAP_LDAP_BASE_DN: dc=pona,dc=la
      LLDAP_LDAP_USER_PASS: ${LDAP_ADMIN_PASS}
      LLDAP_KEY_FILE: ""

      LLDAP_SMTP_OPTIONS__ENABLE_PASSWORD_RESET: true
      LLDAP_SMTP_OPTIONS__SERVER: mail.osphost.net
      LLDAP_SMTP_OPTIONS__PORT: 465
      LLDAP_SMTP_OPTIONS__SMTP_ENCRYPTION: TLS

      LLDAP_SMTP_OPTIONS__USER: noreply@mi.${DOMAIN}
      LLDAP_SMTP_OPTIONS__PASSWORD: ${SMTP_PASSWORD}

      LLDAP_SMTP_OPTIONS__FROM: ilo <noreply@mi.${DOMAIN}>
      LLDAP_SMTP_OPTIONS__TO: lawa pi mi pona <lawa@mi.${DOMAIN}>
  lldap-reg:
    container_name: lldap-reg
    build:
      context: .
      dockerfile: Containerfile
    environment:
      LLDAP_URL: http://lldap:17170
      LLDAP_USER: admin
      LLDAP_PASS: ${LDAP_ADMIN_PASS}
      REGISTER_PATH: /register/
      
    depends_on:
      - lldap
    restart: unless-stopped
  anubis:
    image: ghcr.io/techarohq/anubis:latest
    restart: unless-stopped
    container_name: anubis
    depends_on:
      - lldap-reg
    environment:
      BIND: ":3000"
      TARGET: http://lldap-reg:8080
  dozzle:
    container_name: dozzle
    restart: unless-stopped
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dozzle-data:/data
    environment:
      DOZZLE_HOSTNAME: ilo suli

# This stores the LDAP password as a file in the tuwunel container as required by tuwunel's LDAP configuration.
secrets:
  ldap_bind_password:
    environment: LDAP_ADMIN_PASS

volumes:
  caddy-data:
  caddy-config:
  tuwunel-data:
  lldap-data:
  ooye-data:
  dozzle-data:
  dex-data:
