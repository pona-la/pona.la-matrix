services:
  caddy:
    container_name: caddy
    image: caddy:latest
    ports:
      - 80:80
      - 443:443
    environment:
      DOMAIN: ${DOMAIN}
      TZ: ${TZ}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - tuwunel-caddy
  tuwunel:
    container_name: tuwunel
    image: jevolk/tuwunel:latest
    restart: unless-stopped
    volumes:
        - tuwunel-data:/var/lib/tuwunel
    environment:
        TUWUNEL_SERVER_NAME: ${DOMAIN}
        TUWUNEL_TRUSTED_SERVERS: '["matrix.org"]'
        TUWUNEL_FORGET_FORCED_UPON_LEAVE: true
        TUWUNEL_LOCKDOWN_PUBLIC_ROOM_DIRECTORY: true
        TUWUNEL_ALLOW_ROOM_CREATION: false
        TUWUNEL_ADDRESS: 0.0.0.0

    depends_on:
      - caddy
    networks:
      - tuwunel-caddy

volumes:
  caddy-data:
  caddy-config:
  tuwunel-data:

networks:
  tuwunel-caddy:
